<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摩托车爬山 - Hill Climb Racing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="score-display">
                <span class="label">距离:</span>
                <span id="distance">0</span>
                <span class="unit">米</span>
            </div>
            <div class="best-score">
                <span class="label">最高:</span>
                <span id="bestDistance">0</span>
                <span class="unit">米</span>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="900" height="500"></canvas>
        
        <div class="controls-hint">
            <span>🖱️ 按住右键加速</span>
            <span>🖱️ 按住左键刹车/后退</span>
        </div>
        
        <div id="gameOverScreen" class="game-over hidden">
            <h2>游戏结束!</h2>
            <p class="final-score">本次距离: <span id="finalDistance">0</span> 米</p>
            <p class="best-score-text">最高纪录: <span id="finalBest">0</span> 米</p>
            <button id="restartBtn">再来一局</button>
        </div>
        
        <div id="startScreen" class="start-screen">
            <h1>🏍️ 摩托车爬山</h1>
            <p>在起伏的山坡上驰骋，跑得越远分数越高！</p>
            <p class="hint">小心翻车哦~</p>
            <button id="startBtn">开始游戏</button>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
